name: CI — Backend

on:
  push:
    branches: [dev]
    paths:
      - 'packages/backend/**'
      - 'packages/db/**'
      - 'packages/baml/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'packages/backend/**'
      - 'packages/db/**'
      - 'packages/baml/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter db generate

      - name: Generate BAML client
        run: pnpm --filter baml generate

      - name: Typecheck backend
        run: pnpm --filter backend typecheck

      - name: Audit production dependencies (high+ severity)
        run: pnpm audit --prod --audit-level=high

  docker-build-check:
    name: Docker build check (release dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push — verifies release will succeed)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
