name: Backend — Release

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/backend/**'
      - 'packages/db/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  release:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/duitlater-backend
          # main → :latest + :sha-<short>
          # dev  → :dev    + :dev-sha-<short>
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=dev-sha-,format=short,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pull command
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "Prod image pushed. Pull on VPS:"
            echo "   docker pull ghcr.io/${{ github.repository_owner }}/duitlater-backend:latest"
          else
            echo "Dev image pushed. Pull on VPS:"
            echo "   docker pull ghcr.io/${{ github.repository_owner }}/duitlater-backend:dev"
          fi
