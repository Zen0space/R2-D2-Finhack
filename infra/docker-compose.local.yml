services:
  postgres:
    image: postgres:16-alpine
    container_name: duitlater-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: duitlater
      POSTGRES_PASSWORD: duitlater_dev
      POSTGRES_DB: duitlater
    ports:
      - "5432:5432"
    volumes:
      - duitlater_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duitlater -d duitlater"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  duitlater_postgres_dev_data:
