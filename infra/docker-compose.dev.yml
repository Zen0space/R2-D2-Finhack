# DuitLater · dev stack (dev branch → dev.duitlater.com)
# Run on VPS: docker compose -f infra/docker-compose.dev.yml -p dev up -d
# Joins the `duitlater_web` network created by the prod stack — Caddy in prod routes both subdomains.
# Bring prod up first so the network and Caddy exist.

services:
  frontend:
    # TODO(akmal): swap to `image: ghcr.io/zen0space/duitlater-frontend:dev` once packages/frontend/Dockerfile lands.
    build:
      context: ..
      dockerfile: packages/frontend/Dockerfile
    container_name: duitlater-dev-frontend
    restart: unless-stopped
    env_file:
      - ../packages/frontend/.env.dev
    networks:
      - web
    expose:
      - "3000"

  app:
    image: ghcr.io/zen0space/duitlater-backend:dev
    container_name: duitlater-dev-app
    restart: unless-stopped
    env_file:
      - ../packages/backend/.env.dev
    networks:
      - web
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: duitlater-dev-postgres
    restart: unless-stopped
    env_file:
      - ../packages/backend/.env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-duitlater}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-duitlater_dev}
    volumes:
      - duitlater_dev_postgres_data:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-duitlater} -d ${POSTGRES_DB:-duitlater_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  duitlater_dev_postgres_data:

networks:
  web:
    name: duitlater_web
    external: true
