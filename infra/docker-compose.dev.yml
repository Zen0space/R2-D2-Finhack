# DuitLater · dev stack (dev branch → dev.duitlater.com)
# Caddy runs in the prod stack and routes to these dev containers
# through the shared duitlater_web network.
#
# First-time: docker compose -f infra/docker-compose.dev.yml -p dev up -d
# Subsequent: docker compose -f infra/docker-compose.dev.yml -p dev pull app && up -d app

services:
  frontend:
    # TODO(akmal): swap to `image: ghcr.io/zen0space/duitlater-frontend:dev` once frontend-release.yml lands.
    build:
      context: ..
      dockerfile: packages/frontend/Dockerfile
    container_name: duitlater-dev-frontend
    restart: unless-stopped
    env_file:
      - ../packages/frontend/.env.dev
    networks:
      - web
    depends_on:
      - app

  app:
    image: ghcr.io/zen0space/duitlater-backend:${BACKEND_TAG:-dev}
    container_name: duitlater-dev-app
    restart: unless-stopped
    env_file:
      - ../packages/backend/.env.dev
    environment:
      UPLOAD_ROOT: /data/uploads
      UPLOAD_PUBLIC_PATH: /uploads
    volumes:
      - ${DEV_UPLOAD_HOST_PATH:-/var/lib/duitlater/dev/uploads}:/data/uploads
    networks:
      - web
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: duitlater-dev-postgres
    restart: unless-stopped
    env_file:
      - ../packages/backend/.env.dev
    volumes:
      - duitlater_dev_postgres_data:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-duitlater} -d $${POSTGRES_DB:-duitlater_dev}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prod-frontend:
    image: ghcr.io/zen0space/duitlater-frontend:${PROD_FRONTEND_TAG:-latest}
    container_name: duitlater-prod-frontend
    restart: unless-stopped
    env_file:
      - ../packages/frontend/.env.prod
    networks:
      - web
    expose:
      - "3000"

  prod-app:
    image: ghcr.io/zen0space/duitlater-backend:${PROD_BACKEND_TAG:-latest}
    container_name: duitlater-prod-app
    restart: unless-stopped
    env_file:
      - ../packages/backend/.env.prod
    networks:
      - web
    expose:
      - "4000"
    depends_on:
      prod-postgres:
        condition: service_healthy

  prod-postgres:
    image: postgres:17-alpine
    container_name: duitlater-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PROD_POSTGRES_USER:-duitlater}
      POSTGRES_PASSWORD: ${PROD_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PROD_POSTGRES_DB:-duitlater}
    volumes:
      - duitlater_prod_postgres_data:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROD_POSTGRES_USER:-duitlater} -d ${PROD_POSTGRES_DB:-duitlater}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  duitlater_dev_postgres_data:
  duitlater_prod_postgres_data:
  caddy_dev_data:
  caddy_dev_config:

networks:
  web:
    name: duitlater_web
    external: true
