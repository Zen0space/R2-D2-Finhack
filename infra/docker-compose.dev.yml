# DuitLater · dev API stack (dev branch → dev.api.duitlater.com)
# Backend + Postgres only. Frontend joins once packages/frontend/Dockerfile lands.
#
# First-time: docker compose -f infra/docker-compose.dev.yml -p dev up -d
# Subsequent: docker compose -f infra/docker-compose.dev.yml -p dev pull app && up -d app

services:
  caddy:
    image: caddy:2-alpine
    container_name: duitlater-dev-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DUITLATER_DOMAIN: ${DUITLATER_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_dev_data:/data
      - caddy_dev_config:/config
    networks:
      - web
    depends_on:
      - app
      - frontend

  frontend:
    image: ghcr.io/zen0space/duitlater-frontend:${FRONTEND_TAG:-dev}
    container_name: duitlater-dev-frontend
    restart: unless-stopped
    env_file:
      - ../packages/frontend/.env.dev
    networks:
      - web
    expose:
      - "3000"

  app:
    image: ghcr.io/zen0space/duitlater-backend:${BACKEND_TAG:-dev}
    container_name: duitlater-dev-app
    restart: unless-stopped
    env_file:
      - ../packages/backend/.env.dev
    networks:
      - web
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: duitlater-dev-postgres
    restart: unless-stopped
    env_file:
      - ../packages/backend/.env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-duitlater}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-duitlater_dev}
    volumes:
      - duitlater_dev_postgres_data:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-duitlater} -d ${POSTGRES_DB:-duitlater_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  duitlater_dev_postgres_data:
  caddy_dev_data:
  caddy_dev_config:

networks:
  web:
    name: duitlater_dev_web
    driver: bridge
