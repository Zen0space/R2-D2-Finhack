# DuitLater · prod stack (main branch → duitlater.com)
# Run on VPS: docker compose -f infra/docker-compose.prod.yml -p prod up -d
# Backend pulls pre-built image from GHCR. Frontend awaits packages/frontend/Dockerfile (Akmal).

services:
  caddy:
    image: caddy:2-alpine
    container_name: duitlater-prod-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - frontend
      - app

  frontend:
    # TODO(akmal): swap to `image: ghcr.io/zen0space/duitlater-frontend:latest` once packages/frontend/Dockerfile lands.
    build:
      context: ..
      dockerfile: packages/frontend/Dockerfile
    container_name: duitlater-prod-frontend
    restart: unless-stopped
    env_file:
      - ../packages/frontend/.env.prod
    networks:
      - web
    expose:
      - "3000"

  app:
    image: ghcr.io/zen0space/duitlater-backend:latest
    container_name: duitlater-prod-app
    restart: unless-stopped
    env_file:
      - ../packages/backend/.env.prod
    networks:
      - web
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: duitlater-prod-postgres
    restart: unless-stopped
    env_file:
      - ../packages/backend/.env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-duitlater}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-duitlater}
    volumes:
      - duitlater_prod_postgres_data:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-duitlater} -d ${POSTGRES_DB:-duitlater}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  duitlater_prod_postgres_data:
  caddy_data:
  caddy_config:

networks:
  web:
    name: duitlater_web
    driver: bridge
