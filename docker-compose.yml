services:
  postgres:
    image: postgres:17-alpine
    container_name: kutu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kutu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kutu_dev}
      POSTGRES_DB: ${POSTGRES_DB:-kutu_digitizer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kutu} -d ${POSTGRES_DB:-kutu_digitizer}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: kutu-postgres-data
